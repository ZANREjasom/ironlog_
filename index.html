<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#070808">
<title>IRONLOG</title>
<meta name="apple-mobile-web-app-title" content="IRONLOG">
<meta name="mobile-web-app-capable" content="yes">

<!-- Firebase 9 compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ── RESET & ROOT ─────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#070808;--s1:#0f1010;--s2:#181919;--s3:#202222;
  --border:#252727;--border2:#2e3030;
  --acc:#B8FF00;--acc-bg:rgba(184,255,0,.09);--acc-br:rgba(184,255,0,.25);
  --red:#FF4444;--red-bg:rgba(255,68,68,.08);
  --blue:#4FC3F7;--purple:#CE93D8;--orange:#FFB74D;--teal:#4DB6AC;
  --text:#EBEBEB;--sub:#777;--mut:#3a3a3a;
  --fd:'Bebas Neue',Impact,sans-serif;
  --fb:'Barlow',system-ui,sans-serif;
  --fm:'DM Mono','Courier New',monospace;
  --nav:56px;
  --top:env(safe-area-inset-top,0px);
  --bot:env(safe-area-inset-bottom,0px);
}
html{height:-webkit-fill-available;background:var(--bg);}
body{height:100vh;height:-webkit-fill-available;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden;position:fixed;width:100%;}
input,textarea,select{font-family:inherit;font-size:16px;border-radius:0;-webkit-appearance:none;appearance:none;}
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:var(--border2);}

/* ── SHELL ────────────────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}

/* ── LOADING ─────────────────────────────────────────────────────────── */
.fullscreen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:99;}
.boot-logo{font-family:var(--fd);font-size:42px;letter-spacing:5px;color:var(--acc);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}

/* ── LOGIN SCREEN ────────────────────────────────────────────────────── */
.login-screen{
  padding:calc(var(--top)+40px) 32px calc(var(--bot)+32px);
  display:flex;flex-direction:column;justify-content:center;
  min-height:100dvh;min-height:-webkit-fill-available;
  max-width:480px;margin:0 auto;width:100%;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.login-logo{font-family:var(--fd);font-size:clamp(40px,11vw,56px);letter-spacing:clamp(2px,1.5vw,6px);color:var(--acc);line-height:1;}
.login-logo span{color:var(--mut);}
.login-tag{font-size:13px;color:var(--sub);margin-top:6px;margin-bottom:56px;font-family:var(--fm);}
.login-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:2px;font-family:var(--fm);margin-bottom:16px;}
.google-btn{display:flex;align-items:center;gap:12px;width:100%;padding:16px 18px;background:var(--s1);border:1px solid var(--border2);color:var(--text);cursor:pointer;font-size:15px;font-weight:600;transition:border-color .15s;}
.google-btn:active{border-color:var(--acc);}
.google-icon{width:20px;height:20px;flex-shrink:0;}
.login-note{font-size:11px;color:var(--mut);margin-top:20px;line-height:1.8;font-family:var(--fm);}

/* ── HEADER ──────────────────────────────────────────────────────────── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);}
.logo{font-family:var(--fd);font-size:26px;letter-spacing:3px;color:var(--acc);}
.logo span{color:var(--mut);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.avatar{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);object-fit:cover;}
.avatar-fallback{width:32px;height:32px;border-radius:50%;background:var(--s2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--acc);}
.hdr-btn{background:none;border:none;color:var(--sub);cursor:pointer;font-family:var(--fm);font-size:10px;padding:5px 8px;border:1px solid var(--border);letter-spacing:.5px;}
.hdr-btn:active{border-color:var(--acc);color:var(--acc);}

/* ── NAV ──────────────────────────────────────────────────────────────── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.nav{flex-shrink:0;display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border);background:var(--s1);padding-bottom:var(--bot);}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--mut);font-size:8px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;font-family:var(--fb);padding:8px 0;min-height:var(--nav);}
.nb svg{width:19px;height:19px;}
.nb.on{color:var(--acc);}
.nb-badge{background:var(--red);color:#fff;font-size:8px;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:6px;right:calc(50% - 16px);font-family:var(--fm);}

/* ── WEEK ─────────────────────────────────────────────────────────────── */
.wk-top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;}
.wk-label{font-family:var(--fd);font-size:22px;letter-spacing:1px;}
.wk-sub{font-size:11px;color:var(--sub);font-family:var(--fm);margin-top:1px;}
.wk-navs{display:flex;gap:6px;align-items:center;}
.wk-btn{background:var(--s2);border:1px solid var(--border2);color:var(--text);width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;}
.wk-btn:active{border-color:var(--acc);}
.today-lbl{font-family:var(--fm);font-size:10px;color:var(--sub);border:1px solid var(--border2);padding:6px 9px;cursor:pointer;background:none;}
.today-lbl:active{border-color:var(--acc);color:var(--acc);}

.sum-bar{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.sum-item{flex:1;padding:10px 0;text-align:center;border-right:1px solid var(--border);}
.sum-item:last-child{border-right:none;}
.sum-val{font-family:var(--fm);font-size:18px;color:var(--acc);}
.sum-key{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;font-family:var(--fm);}

.day-list{display:flex;flex-direction:column;gap:1px;background:var(--border);}
.dc{background:var(--s1);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;border-left:3px solid transparent;}
.dc:active{background:var(--s2);}
.dc.today{border-left-color:var(--acc);}
.dc.rest{opacity:.4;cursor:default;pointer-events:none;}
.dc-day{font-family:var(--fd);font-size:36px;line-height:1;width:38px;color:var(--sub);text-align:center;}
.dc.today .dc-day{color:var(--acc);}
.dc-info{flex:1;min-width:0;}
.dc-name{font-weight:600;font-size:14px;}
.dc-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.dc-right{text-align:right;flex-shrink:0;}
.dc-count{font-family:var(--fm);font-size:12px;color:var(--sub);}
.dc-count.has{color:var(--acc);}
.dc-date{font-size:11px;color:var(--mut);margin-top:3px;font-family:var(--fm);}

/* ── DAY SLIDE VIEW ──────────────────────────────────────────────────── */
.dv{position:absolute;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);pointer-events:none;}
.dv.open{transform:translateX(0);pointer-events:auto;}
.dv-hdr{display:flex;align-items:center;gap:10px;padding:16px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);}
.back{background:none;border:none;color:var(--text);cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;margin-left:-8px;}
.dv-title{flex:1;min-width:0;}
.dv-dn{font-family:var(--fd);font-size:24px;letter-spacing:1px;line-height:1;}
.dv-dl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--acc);margin-top:3px;}
.dv-date{font-family:var(--fm);font-size:11px;color:var(--sub);flex-shrink:0;}
.dv-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;overscroll-behavior:contain;}

/* ── EXERCISE CARDS ───────────────────────────────────────────────────── */
.ex-card{background:var(--s1);border:1px solid var(--border);margin-bottom:10px;}
.ex-hdr{display:flex;align-items:center;padding:11px 14px;gap:8px;border-bottom:1px solid var(--border);}
.ex-hdr-name{flex:1;font-weight:700;font-size:15px;}
.ex-del{background:none;border:none;color:var(--sub);cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ex-del:active{color:var(--red);}
.sets-head{display:grid;grid-template-columns:26px 1fr 1fr 38px;background:var(--s2);}
.sh-cell{padding:6px 8px;font-size:9px;color:var(--mut);font-family:var(--fm);text-transform:uppercase;letter-spacing:1.2px;text-align:center;}
.set-row{display:grid;grid-template-columns:26px 1fr 1fr 38px;align-items:center;border-top:1px solid var(--s3);}
.set-num{text-align:center;font-family:var(--fm);font-size:11px;color:var(--sub);}
.set-cell{padding:4px 6px;}
.set-inp{width:100%;background:var(--s3);border:1px solid var(--border);color:var(--text);font-family:var(--fm);font-size:16px;font-weight:500;padding:8px 4px;text-align:center;outline:none;transition:border-color .15s;}
.set-inp:focus{border-color:var(--acc);background:var(--acc-bg);}
.set-inp::placeholder{color:var(--mut);font-size:12px;}
.set-del-btn{background:none;border:none;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;width:38px;height:100%;padding:8px 0;}
.set-del-btn:active{color:var(--red);}
.add-set-btn{display:flex;align-items:center;gap:7px;padding:9px 14px;background:none;border:none;color:var(--sub);cursor:pointer;font-size:12px;font-weight:600;width:100%;border-top:1px solid var(--s3);}
.add-set-btn:active{background:var(--s2);}
.add-ex-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;background:none;border:1px dashed var(--border2);color:var(--sub);cursor:pointer;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}
.add-ex-btn:active{border-color:var(--acc);color:var(--acc);}

/* ── EXERCISE SEARCH MODAL ────────────────────────────────────────────── */
.ex-modal{position:absolute;inset:0;z-index:40;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;pointer-events:none;opacity:0;transition:opacity .2s;}
.ex-modal.open{opacity:1;pointer-events:auto;}
.ex-modal-inner{background:var(--s1);width:100%;max-height:82vh;display:flex;flex-direction:column;border-top:1px solid var(--border2);transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.ex-modal.open .ex-modal-inner{transform:translateY(0);}
.ex-modal-top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);}
.ex-search-inp{flex:1;background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:10px 14px;font-size:16px;outline:none;}
.ex-search-inp:focus{border-color:var(--acc);}
.ex-cancel{background:none;border:none;color:var(--sub);cursor:pointer;font-size:22px;padding:4px 8px;}
.ex-list{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.ex-cat-label{font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--mut);padding:10px 14px 4px;background:var(--bg);}
.ex-item{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;font-size:14px;font-weight:500;}
.ex-item:active{background:var(--s2);color:var(--acc);}
.ex-item.match{color:var(--text);}

/* ── HINTS ───────────────────────────────────────────────────────────── */
.hint-bar-lbl{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--fm);padding:8px 14px 0;}
.last-hint{padding:6px 14px 10px;display:flex;gap:6px;flex-wrap:wrap;}
.hint-chip{font-family:var(--fm);font-size:11px;color:var(--sub);background:var(--s2);border:1px solid var(--border);padding:4px 9px;cursor:pointer;}
.hint-chip:active{border-color:var(--acc-br);color:var(--acc);}
.hint-chip.all{border-color:var(--acc-br);color:var(--acc);}
.wk-footer{margin-top:16px;padding:12px 14px;background:var(--s1);border:1px solid var(--acc-br);display:flex;justify-content:space-between;align-items:center;}
.wk-footer-label{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--fm);}
.wk-footer-val{font-family:var(--fm);color:var(--acc);font-size:12px;}

/* ── HISTORY ──────────────────────────────────────────────────────────── */
.sec-title{font-family:var(--fd);font-size:22px;letter-spacing:1px;padding:16px 18px 8px;}
.hi-item{border-bottom:1px solid var(--border);}
.hi-hdr{display:flex;align-items:center;padding:13px 18px;gap:12px;cursor:pointer;}
.hi-hdr:active{background:var(--s1);}
.hi-date{font-family:var(--fm);font-size:12px;color:var(--acc);}
.hi-dow{font-size:10px;color:var(--mut);font-family:var(--fm);margin-top:2px;}
.hi-info{flex:1;}
.hi-label{font-weight:700;font-size:14px;}
.hi-meta{font-size:11px;color:var(--sub);margin-top:2px;}
.hi-chev{color:var(--mut);transition:transform .2s;font-size:18px;flex-shrink:0;}
.hi-body{padding:0 18px 14px;}
.hi-ex{margin-bottom:8px;}
.hi-ex-name{font-size:13px;font-weight:600;}
.hi-sets-txt{font-family:var(--fm);font-size:11px;color:var(--sub);margin-top:3px;line-height:1.9;}

/* ── STATS ────────────────────────────────────────────────────────────── */
.stat-dual{display:flex;gap:1px;background:var(--border);}
.stat-half{flex:1;background:var(--s1);padding:14px 18px;}
.stat-big{font-family:var(--fd);font-size:44px;color:var(--acc);line-height:1;}
.stat-big-lbl{font-family:var(--fd);font-size:15px;letter-spacing:1px;margin-top:4px;}
.stat-big-sub{font-size:10px;color:var(--sub);margin-top:2px;}
.pr-lbl{padding:10px 18px 6px;font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:2px;font-family:var(--fm);}
.stat-card{background:var(--s1);border-bottom:1px solid var(--border);padding:14px 18px;}
.stat-ex-name{font-weight:700;font-size:14px;margin-bottom:10px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.stat-box{text-align:center;}
.stat-val{font-family:var(--fm);font-size:20px;color:var(--acc);}
.stat-key{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;font-family:var(--fm);margin-top:3px;}

/* ── SETUP ────────────────────────────────────────────────────────────── */
.setup-wrap{position:fixed;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);padding:calc(var(--top)+24px) 20px calc(var(--bot)+24px);z-index:50;}
.setup-inner{max-width:480px;margin:0 auto;}
.setup-logo{font-family:var(--fd);font-size:44px;letter-spacing:5px;color:var(--acc);}
.setup-logo span{color:var(--mut);}
.setup-sub{font-size:13px;color:var(--sub);margin-bottom:24px;margin-top:4px;}
.setup-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--sub);margin-bottom:10px;font-family:var(--fm);}
.split-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:22px;}
.split-opt{background:var(--s1);border:1px solid var(--border);padding:14px;cursor:pointer;}
.split-opt:active{background:var(--s2);}
.split-opt.sel{border-color:var(--acc);background:var(--acc-bg);}
.so-short{font-family:var(--fd);font-size:30px;color:var(--acc);line-height:1;}
.so-name{font-size:11px;color:var(--sub);margin-top:3px;}
.split-opt.sel .so-name{color:var(--text);}
.preview{display:flex;flex-direction:column;gap:6px;margin-bottom:22px;}
.prev-row{display:grid;grid-template-columns:40px 1fr;align-items:center;gap:8px;}
.prev-day{font-family:var(--fm);font-size:11px;color:var(--sub);}
.prev-val{font-size:13px;font-weight:600;}
.prev-val.rest{color:var(--mut);}
.custom-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:22px;}
.cr{display:flex;align-items:center;gap:10px;}
.cr-day{font-family:var(--fm);font-size:12px;color:var(--sub);width:26px;flex-shrink:0;}
.cr-inp{flex:1;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:10px 12px;font-size:16px;outline:none;transition:border-color .15s;}
.cr-inp:focus{border-color:var(--acc);}
.start-btn{background:var(--acc);color:var(--bg);padding:16px;font-family:var(--fd);font-size:24px;letter-spacing:3px;border:none;cursor:pointer;width:100%;margin-top:16px;}
.start-btn:active{opacity:.8;}

/* ── FRIENDS ──────────────────────────────────────────────────────────── */
.friends-tabs{display:flex;border-bottom:1px solid var(--border);}
.ftab{flex:1;padding:12px;background:none;border:none;color:var(--sub);font-family:var(--fm);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;border-bottom:2px solid transparent;}
.ftab.on{color:var(--acc);border-bottom-color:var(--acc);}

.friend-search-row{display:flex;gap:8px;padding:14px 18px;border-bottom:1px solid var(--border);}
.friend-inp{flex:1;background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:10px 14px;font-size:16px;outline:none;}
.friend-inp:focus{border-color:var(--acc);}
.send-btn{background:var(--acc);color:var(--bg);border:none;padding:10px 16px;font-family:var(--fd);font-size:18px;letter-spacing:1px;cursor:pointer;flex-shrink:0;}
.send-btn:active{opacity:.8;}
.send-btn:disabled{opacity:.3;cursor:default;}

.friend-result{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.fr-avatar{width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);object-fit:cover;flex-shrink:0;}
.fr-avatar-fb{width:38px;height:38px;border-radius:50%;background:var(--s2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--acc);flex-shrink:0;}
.fr-info{flex:1;min-width:0;}
.fr-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fr-email{font-size:11px;color:var(--sub);font-family:var(--fm);margin-top:2px;}
.fr-action{background:none;border:1px solid var(--border2);color:var(--sub);padding:7px 12px;cursor:pointer;font-size:12px;font-weight:600;flex-shrink:0;}
.fr-action.add{border-color:var(--acc-br);color:var(--acc);}
.fr-action.accept{background:var(--acc);color:var(--bg);border-color:var(--acc);font-family:var(--fd);font-size:15px;letter-spacing:.5px;}
.fr-action:active{opacity:.7;}

.req-label{padding:10px 18px 6px;font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:2px;font-family:var(--fm);}
.empty{padding:40px 20px;text-align:center;color:var(--mut);font-size:13px;line-height:2;}

/* ── COMPARE ──────────────────────────────────────────────────────────── */
.cmp-section{padding:14px 18px;border-bottom:1px solid var(--border);}
.cmp-lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:2px;font-family:var(--fm);margin-bottom:8px;}
.ex-select-btn{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--border2);color:var(--text);text-align:left;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.ex-select-btn:active{border-color:var(--acc);}
.ex-select-btn .placeholder{color:var(--sub);font-weight:400;}
.friends-toggle-list{display:flex;flex-direction:column;gap:6px;}

/* ─── FIRESTORE OPS ──────────────────────────────────────────────────────── */
const userRef = (uid)=>db.collection("users").doc(uid);
const wkRef   = (uid,dk)=>userRef(uid).collection("workouts").doc(dk);

async function ensureProfile(user) {
  const snap = await userRef(user.uid).get();
  if (!snap.exists) {
    await userRef(user.uid).set({
      displayName: user.displayName||"Anonym",
      email: user.email||"",
      photoURL: user.photoURL||"",
      split: null,
      friends: [],
      friendRequests: {},
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    return (await userRef(user.uid).get()).data();
  }
  return snap.data();
}

async function saveProfile(data){
  await userRef(S.user.uid).set(data, {merge:true});
}

async function saveDayWorkout(dateKey, exercises){
  S.workouts = {...S.workouts, [dateKey]: exercises};
  await wkRef(S.user.uid, dateKey).set({
    exercises,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

function silentSaveDayWorkout(dateKey, exercises){
  S.workouts = {...S.workouts, [dateKey]: exercises};
  wkRef(S.user.uid, dateKey).set({
    exercises,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  }).catch(console.error);
}

async function loadWeekWorkouts(dateKeys){
  const snaps = await Promise.all(dateKeys.map(k=>wkRef(S.user.uid,k).get()));
  const res = {};
  snaps.forEach((s,i)=>{ if(s.exists) res[dateKeys[i]] = s.data().exercises||[]; });
  return res;
}

async function loadAllWorkouts(){
  const snap = await userRef(S.user.uid).collection("workouts").get();
  const res = {};
  snap.forEach(doc=>{ res[doc.id] = doc.data().exercises||[]; });
  return res;
}

async function loadFriendWorkouts(friendUid){
  const snap = await userRef(friendUid).collection("workouts").get();
  const res = {};
  snap.forEach(doc=>{ res[doc.id] = doc.data().exercises||[]; });
  return res;
}

async function loadFriendProfiles(ids){
  if(!ids||!ids.length) return [];
  const snaps = await Promise.all(ids.map(id=>userRef(id).get()));
  return snaps.filter(s=>s.exists).map(s=>({uid:s.id,...s.data()}));
}

// Banned words filter — checks if name contains any blocked term
const BANNED = ["nigger","nigga","faggot","retard","chink","spic","kike","cunt","tranny",
  "negro","wetback","gook","cracker","whore","slut","bitch","fuck","shit","ass","dick",
  "cock","pussy","bastard","prick","twat","wanker","bollocks","crap","piss","arse"];

function containsBanned(text){
  const lower = text.toLowerCase().replace(/[^a-z0-9 ]/g,"");
  return BANNED.some(w => {
    const re = new RegExp("\\b" + w + "\\b");
    return re.test(lower);
  });
}

function normalizeExName(name){
  // Capitalize each word, trim, collapse spaces
  return name.trim().replace(/\s+/g," ")
    .replace(/\b\w/g, c => c.toUpperCase());
}

async function deleteCustomExercise(name){

async function loadCommunityExercises(){

async function submitCustomExercise(rawName){
  const name = normalizeExName(rawName);

  // Validations
  if(name.length < 3)
    return setState({customExMsg:{ok:false, text:"Názov musí mať aspoň 3 znaky."}});
  if(name.length > 60)
    return setState({customExMsg:{ok:false, text:"Názov je príliš dlhý (max 60 znakov)."}});
  if(containsBanned(name))
    return setState({customExMsg:{ok:false, text:"Tento výraz nie je povolený."}});

  // Check duplicate in built-in library
  const allNames = Object.values(LIBRARY).flat().map(n=>n.toLowerCase());
  if(allNames.includes(name.toLowerCase()))
    return setState({customExMsg:{ok:false, text:"Tento cvik už je v knižnici."}});

  // Check duplicate in community
  if(S.communityExs.map(n=>n.toLowerCase()).includes(name.toLowerCase()))
    return setState({customExMsg:{ok:false, text:"Tento cvik už niekto pridal."}});

  try {
    setState({customExMsg:{ok:false, text:"Ukladám..."}});
    const docId = name.toLowerCase().replace(/[^a-z0-9]/g,"-");
    await db.collection("exercises").doc(docId).set({
      name,
      addedBy: S.user.uid,
      addedByName: S.profile.displayName,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    S.communityExs = [...S.communityExs, name].sort();
    setState({customExMsg:{ok:true, text:`"${name}" pridaný do knižnice ✓`}});
    // Clear message after 3s
    setTimeout(()=>{ S.customExMsg=null; render(); }, 3000);
  } catch(e){
    setState({customExMsg:{ok:false, text:"Chyba: " + e.message}});
  }
}

/* ─── AUTH LISTENER ──────────────────────────────────────────────────────── */
let profileUnsub = null;
auth.onAuthStateChanged(async user => {
  if(profileUnsub){ profileUnsub(); profileUnsub=null; }
  if(!user){
    // If redirect is in progress, keep showing loader instead of login screen
    if(_redirectPending){
      setState({authReady:true, user:null, profile:null, loading:true});
      return;
    }
    setState({authReady:true, user:null, profile:null, loading:false});
    return;
  }

  // Show loading spinner while we fetch profile
  setState({authReady:true, user, loading:true});

  try {
    // Ensure user profile doc exists in Firestore
    const profile = await ensureProfile(user);

    // Load friends
    const friendIds = profile.friends||[];
    const friends = await loadFriendProfiles(friendIds);

    // Load current week workouts
    const mon = weekMon(S.weekOff);
    const dateKeys = weekDates(mon).map(fmtKey);
    const workouts = await loadWeekWorkouts(dateKeys);
    Object.assign(S.workouts, workouts);

    setState({ authReady:true, user, profile, friends, loading:false });
    // Log UID so you can copy it into ADMIN_UID above
    if(ADMIN_UID === "REPLACE_WITH_YOUR_UID")
      console.log("%c IRONLOG: Tvoj UID = " + user.uid + "  ← skopíruj do ADMIN_UID v kóde", "background:#B8FF00;color:#000;padding:4px 8px;font-weight:bold");

    // Set up live listener for profile changes (friend requests etc.)
    profileUnsub = userRef(user.uid).onSnapshot(async snap => {
      if(!snap.exists) return;
      const updatedProfile = snap.data();
      const updatedFriendIds = updatedProfile.friends||[];
      // Only reload friends if the list changed
      const prevIds = JSON.stringify(S.profile?.friends||[]);
      const newIds  = JSON.stringify(updatedFriendIds);
      const friends = prevIds !== newIds
        ? await loadFriendProfiles(updatedFriendIds)
        : S.friends;
      setState({ profile: updatedProfile, friends });
    }, err => console.warn("Profile listener error (non-critical):", err));

  } catch(err) {
    console.error("Auth setup error:", err);
    // Firestore rules likely not configured — show helpful error
    const msg = err.code === "permission-denied"
      ? "Firestore pravidlá nie sú nastavené. Otvor Firebase Console → Firestore → Rules a vlož správne pravidlá (sú v komentári v kóde)."
      : "Chyba pri načítaní profilu: " + err.message;
    setState({
      authReady:true, user, profile:null, loading:false,
      firestoreError: msg
    });
  }
});

/* ─── COMPARISON LOGIC ───────────────────────────────────────────────────── */
function maxWeightFor(workouts, exName){
  let max = 0;
  Object.values(workouts).forEach(exs=>{
    (exs||[]).forEach(ex=>{
      if(ex.name!==exName) return;
      ex.sets.forEach(s=>{
        const w=parseFloat(s.weight)||0, r=parseInt(s.reps)||0;
        if(r>=5 && w>max) max=w;
      });
    });
  });
  return max;
}

/* ─── SVG BAR CHART ──────────────────────────────────────────────────────── */
function buildChart(data){
  if(!data.length) return "";
  const maxW = Math.max(...data.map(d=>d.weight), 1);
  const top  = Math.ceil(maxW/10)*10 + 10;
  const n = data.length;
  const W = 660, pad = 48;
  const chartW = W - pad * 2;
  // Bar sizing: leave 30% of slot as gap
  const slot = Math.floor(chartW / n);
  const barW = Math.min(90, Math.floor(slot * 0.65));
  const BAR_H = 160; // height of bar area
  const TOP_PAD = 36; // space above bars for labels
  const LEGEND_H = n > 2 ? Math.ceil(n/2)*22 + 10 : 0;
  const H = TOP_PAD + BAR_H + 20 + LEGEND_H; // total svg height

  const bars = data.map((d,i)=>{
    const x = pad + slot*i + (slot - barW)/2;
    const barH = Math.max(3, BAR_H * (d.weight / top));
    const y = TOP_PAD + BAR_H - barH;
    const label = d.weight > 0 ? d.weight+"kg" : "–";
    // Name: first name only, max 8 chars
    const shortName = d.name.length > 8 ? d.name.slice(0,7)+"…" : d.name;
    return `
      <rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${d.color}" rx="2" opacity="${d.weight>0?'1':'.25'}"/>
      <text x="${x+barW/2}" y="${y-7}" text-anchor="middle" fill="${d.color}" font-family="'DM Mono',monospace" font-size="11" font-weight="500">${label}</text>
      <text x="${x+barW/2}" y="${TOP_PAD+BAR_H+14}" text-anchor="middle" fill="#555" font-family="'Barlow',sans-serif" font-size="11" font-weight="600">${esc(shortName)}</text>`;
  }).join("");

  // Y grid lines (4 lines)
  const yLines = [0,.33,.66,1].map(r=>{
    const val = Math.round(top*r);
    const yy  = TOP_PAD + BAR_H*(1-r);
    return `<line x1="${pad}" y1="${yy}" x2="${W-pad}" y2="${yy}" stroke="#1e2020" stroke-width="1"/>
            <text x="${pad-5}" y="${yy+4}" text-anchor="end" fill="#3a3a3a" font-family="'DM Mono',monospace" font-size="10">${val}</text>`;
  }).join("");

  // Legend (show full names with color dot, 2 columns if > 2 items)
  let legend = "";
  if(n > 2){
    const cols = 2;
    const lSlotW = Math.floor((W - pad*2) / cols);
    legend = data.map((d,i)=>{
      const col = i % cols;
      const row = Math.floor(i / cols);
      const lx = pad + col * lSlotW;
      const ly = TOP_PAD + BAR_H + 28 + row * 22;
      return `<circle cx="${lx+7}" cy="${ly}" r="5" fill="${d.color}"/>
              <text x="${lx+17}" y="${ly+4}" fill="#777" font-family="'Barlow',sans-serif" font-size="11" font-weight="500">${esc(d.name)}</text>`;
    }).join("");
  }

  return `<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
    ${yLines}${bars}${legend}
  </svg>`;
}

/* ─── MUSCLE GROUP TRACKER ───────────────────────────────────────────────── */
// Reverse map: exercise name (lowercase) → short muscle group key
const MUSCLE_GROUPS = {
  "chest":    { label:"Hrudník",  emoji:"🫁", min:2 },
  "back":     { label:"Chrbát",   emoji:"🔙", min:2 },
  "shoulders":{ label:"Ramená",   emoji:"💪", min:2 },
  "biceps":   { label:"Biceps",   emoji:"💪", min:2 },
  "triceps":  { label:"Triceps",  emoji:"💪", min:2 },
  "legs":     { label:"Nohy",     emoji:"🦵", min:2 },
  "glutes":   { label:"Gluty",    emoji:"🍑", min:2 },
  "core":     { label:"Core",     emoji:"🔥", min:2 },
  "cardio":   { label:"Kardio",   emoji:"🏃", min:1 },
};

// Build exercise → group lookup from LIBRARY
const EX_TO_GROUP = {};
const _libMap = {
  "🫁 Hrudník":"chest","🔙 Chrbát":"back","💪 Ramená":"shoulders",
  "💪 Biceps":"biceps","💪 Triceps":"triceps","🦵 Nohy":"legs",
  "🍑 Gluty":"glutes","🦵 Lýtka":"legs","🔥 Core":"core",
  "🏃 Kardio":"cardio","🏋️ Celé telo":"back",
};
Object.entries(LIBRARY).forEach(([cat,exs])=>{
  const grp = _libMap[cat];
  if(grp) exs.forEach(n=>{ EX_TO_GROUP[n.toLowerCase()]=grp; });
});

function calcMuscleWeek(dateKeys){
  // Returns { groupKey: { sessions, sets } }
  const stats = {};
  dateKeys.forEach(dk=>{
    const dayExs = S.workouts[dk]||[];
    const seenGroups = new Set();
    dayExs.forEach(ex=>{
      const grp = EX_TO_GROUP[ex.name.toLowerCase()];
      if(!grp) return;
      if(!stats[grp]) stats[grp] = { sessions:0, sets:0 };
      if(!seenGroups.has(grp)){ stats[grp].sessions++; seenGroups.add(grp); }
      stats[grp].sets += ex.sets.length;
    });
  });
  return stats;
}

function rMuscleTracker(dateKeys){
  const stats = calcMuscleWeek(dateKeys);
  const hasAny = Object.keys(stats).length > 0;
  if(!hasAny) return "";

  // Find neglected groups (trained this week but below minimum)
  const neglected = Object.entries(MUSCLE_GROUPS)
    .filter(([k,g])=> stats[k] && stats[k].sessions > 0 && stats[k].sessions < g.min)
    .map(([,g])=>g.label);

  const maxSessions = Math.max(...Object.values(stats).map(s=>s.sessions), 1);

  const cards = Object.entries(MUSCLE_GROUPS)
    .filter(([k])=> stats[k] && stats[k].sessions > 0)
    .sort(([,a],[,b])=>b.sessions-a.sessions)
    .map(([k,g])=>{
      const s = stats[k];
      const ratio = s.sessions / g.min;
      const statusClass = ratio >= 1 ? "ok" : ratio >= 0.5 ? "mid" : "warn";
      const pct = Math.min(100, Math.round((s.sessions / Math.max(g.min, maxSessions)) * 100));
      const barColor = ratio>=1?"var(--acc)":ratio>=0.5?"#FFB74D":"var(--red)";
      return `
        <div class="muscle-card ${statusClass}">
          <div class="muscle-emoji">${g.emoji}</div>
          <div class="muscle-info">
            <div class="muscle-name">${g.label}</div>
            <div class="muscle-bar-wrap">
              <div class="muscle-bar-fill" style="width:${pct}%;background:${barColor}"></div>
            </div>
            <div class="muscle-meta">${s.sets} set${s.sets!==1?"ov":""}</div>
          </div>
          <div class="muscle-right">
            <div class="muscle-count ${statusClass}">${s.sessions}</div>
            <div class="muscle-unit">/ ${g.min}×</div>
          </div>
        </div>`;
    }).join("");

  const warnHtml = neglected.length
    ? `<div class="warn-banner"><span style="font-size:16px">⚠️</span><div class="warn-banner-txt">Zanedbané partie: <strong>${neglected.join(", ")}</strong> — nedosiahol si odporúčané minimum.</div></div>`
    : "";

  return `
  <div class="muscle-tracker">
    <div class="muscle-tracker-title">Svalové partie tento týždeň</div>
    ${warnHtml}
    <div class="muscle-grid">${cards}</div>
  </div>`;
}

function rStats(){
  if(!S.allLoaded){ loadAll(); return `<div class="empty"><div class="spinner"></div></div>`; }
  const today=new Date(); today.setHours(0,0,0,0);
  let streak=0;
  for(let i=0;i<400;i++){const d=new Date(today);d.setDate(today.getDate()-i);if((S.workouts[fmtKey(d)]||[]).length>0)streak++;else if(i>0)break;}
  const tw=Object.values(S.workouts).filter(e=>(e||[]).length>0).length;
  const pm={};
  Object.values(S.workouts).forEach(exs=>(exs||[]).forEach(ex=>{
    const n=(ex.name||"").trim(); if(!n)return;
    if(!pm[n])pm[n]={bw:0,br:0,ts:0,tv:0,s:0};
    const p=pm[n]; p.s++;
    ex.sets.forEach(s=>{const w=parseFloat(s.weight)||0,r=parseInt(s.reps)||0;if(w>p.bw)p.bw=w;if(r>p.br)p.br=r;p.ts++;p.tv+=w*r;});
  }));
  const entries=Object.entries(pm).sort(([,a],[,b])=>b.tv-a.tv);
  return `
  <div class="stat-dual" style="margin-bottom:1px">
    <div class="stat-half"><div class="stat-big">${streak}</div><div class="stat-big-lbl">DNÍ V RADE</div><div class="stat-big-sub">aktívny streak</div></div>
    <div class="stat-half" style="border-left:1px solid var(--border)"><div class="stat-big">${tw}</div><div class="stat-big-lbl">TRÉNINGOV</div><div class="stat-big-sub">celkovo</div></div>
  </div>
  ${entries.length?`<div class="pr-lbl">Osobné rekordy (max váha, min 5 opak.)</div>`:""}
  ${!entries.length?`<div class="empty">Zaloguj prvý tréning.</div>`:""}
  ${entries.map(([n,p])=>{
    const pr5=Object.values(S.workouts).reduce((best,exs)=>{
      (exs||[]).forEach(ex=>{if(ex.name!==n)return;ex.sets.forEach(s=>{const w=parseFloat(s.weight)||0,r=parseInt(s.reps)||0;if(r>=5&&w>best)best=w;});});return best;},0);
    return `<div class="stat-card">
      <div class="stat-ex-name">🔥 ${esc(n)}</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-val">${p.bw||"–"}</div><div class="stat-key">Max kg</div></div>
        <div class="stat-box"><div class="stat-val">${pr5||"–"}</div><div class="stat-key">PR 5+ rep</div></div>
        <div class="stat-box"><div class="stat-val">${p.s}</div><div class="stat-key">Trén.</div></div>
        <div class="stat-box"><div class="stat-val">${p.tv>999?(p.tv/1000).toFixed(1)+"t":Math.round(p.tv)}</div><div class="stat-key">Vol kg</div></div>
      </div>
    </div>`;
  }).join("")}`;
}

function _attachFriendInputListener(){
  const inp = document.getElementById("friend-email-inp");

}

function _attachInputListener(id, updateFn){
  const el = document.getElementById(id);
  if(!el || el._hasInputListener) return;
  el._hasInputListener = true;
  el.addEventListener("input", function(){
    S.exQuery = this.value;
    updateFn();
    // NO re-attaching delegation here — container element persists, listeners stay
  });
}

function _attachListDelegate(id, selector, handler){
  const el = document.getElementById(id);
  if(!el || el._delegated) return;
  el._delegated = true;
  el.addEventListener("click", function(e){
    // Delete button — handle separately, don't trigger item pick
    const delBtn = e.target.closest(".del-community-btn");
    if(delBtn){ e.stopPropagation(); deleteCustomExercise(delBtn.dataset.delname); return; }
    const item = e.target.closest(selector);
    if(item) handler(item);
  });
}

function _filterExs(){
  const q = (S.exQuery||"").toLowerCase().trim();
  // Built-in exercises
  const filtered = q ? ALL_EX.filter(e=>e.n.toLowerCase().includes(q)) : ALL_EX;
  const grouped = {};
  filtered.forEach(e=>{ if(!grouped[e.cat]) grouped[e.cat]=[]; grouped[e.cat].push(e.n); });
  // Community exercises — separate category
  const builtinNames = new Set(ALL_EX.map(e=>e.n.toLowerCase()));
  const communityFiltered = (S.communityExs||[]).filter(n=>
    !builtinNames.has(n.toLowerCase()) && (!q || n.toLowerCase().includes(q))
  );
  return { filtered, grouped, communityFiltered };
}

function _buildListHTML(grouped, communityFiltered, nameAttr){
  const isAdmin = S.user && (S.user.uid === ADMIN_UID);
  let html = Object.entries(grouped).map(([cat,names])=>
    `<div class="ex-cat-label">${cat}</div>` +
    names.map(n=>`<div class="ex-item match" data-${nameAttr}="${esc(n)}">${esc(n)}</div>`).join("")
  ).join("");
  if(communityFiltered.length){
    html += `<div class="ex-cat-label">👥 Komunita</div>` +
      communityFiltered.map(n=>`
        <div class="ex-item-community" data-${nameAttr}="${esc(n)}">
          <span>${esc(n)}</span>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">

            ${isAdmin ? `<button class="del-community-btn" data-delname="${esc(n)}" title="Vymazať cvik">🗑</button>` : ""}
          </div>
        </div>`).join("");
  }
  return html || `<div class="empty">Nič sa nenašlo.</div>`;
}

/* Auth */
// PWA standalone = added to home screen. Normal browser = Safari/Chrome tab.
// These need DIFFERENT auth strategies — standalone blocks popups, Safari ITP breaks redirects.
const _isPWA        = window.navigator.standalone === true ||
                      window.matchMedia("(display-mode: standalone)").matches;
const _isIOS        = /iPhone|iPad|iPod/i.test(navigator.userAgent);

async function doSignIn(){
  setState({ authError: null });
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope("email");
  provider.addScope("profile");

  if(_isPWA){
    // PWA standalone: popup is blocked by iOS, must use redirect
    try {
      sessionStorage.setItem("ironlog-redirect-pending","1");
      await auth.signInWithRedirect(provider);
    } catch(e){ _showAuthErr(e); }
  } else {
    // Normal browser (Safari tab, Chrome tab): use popup
    // Safari ITP wipes sessionStorage during redirect so redirect doesn't work here
    try {
      await auth.signInWithPopup(provider);
    } catch(e){
      if(e.code === "auth/popup-blocked" || e.code === "auth/cancelled-popup-request"){
        // Popup was blocked — try redirect as last resort
        try {
          sessionStorage.setItem("ironlog-redirect-pending","1");
          await auth.signInWithRedirect(provider);
        } catch(e2){ _showAuthErr(e2); }
      } else if(e.code === "auth/unauthorized-domain"){
        _showAuthErr(e);
      } else if(e.code !== "auth/popup-closed-by-user"){
        _showAuthErr(e);
      }
    }
  }
}
function _showAuthErr(e){
  sessionStorage.removeItem("ironlog-redirect-pending");
  setState({ authError: e.code === "auth/unauthorized-domain"
    ? "Doména <strong>" + location.hostname + "</strong> nie je autorizovaná.<br><br>Firebase Console → Authentication → Settings → Authorized domains → pridaj: <code>" + location.hostname + "</code>"
    : "Chyba prihlásenia: " + e.message });
}

    ? S.cmpSelected.filter(u=>u!==fuid)

async function runCompare(){
  if(!S.cmpEx||!S.cmpSelected.length) return;
  setState({cmpLoading:true, cmpData:null});
  try {
    // Always load all own workouts for comparison accuracy
    if(!S.allLoaded){ await loadAll(); }

    const myMax = maxWeightFor(S.workouts, S.cmpEx);
    const myName = (S.profile.displayName||"Ja").split(" ")[0];
    const bars = [{ name: myName, weight: myMax, color: FRIEND_COLORS[0] }];

    for(let i=0;i<S.cmpSelected.length;i++){
      const fUid = S.cmpSelected[i];
      const f = S.friends.find(fr=>fr.uid===fUid);
      const fname = (f?.displayName||"?").split(" ")[0];
      const fWorkouts = await loadFriendWorkouts(fUid);
      const fMax = maxWeightFor(fWorkouts, S.cmpEx);
      // Use distinct colors — cycle through FRIEND_COLORS skipping index 0 (mine)
      const colorIdx = (i+1) % FRIEND_COLORS.length;
      bars.push({ name: fname, weight: fMax, color: FRIEND_COLORS[colorIdx] });
    }
    setState({cmpData:{exercise:S.cmpEx, bars}, cmpLoading:false});
  } catch(e){
    console.error("runCompare error:", e);
    setState({cmpLoading:false});
  }
}

/* ─── PULL TO REFRESH ────────────────────────────────────────────────────── */
let _ptrStartY = 0, _ptrActive = false, _ptrTriggered = false;

function _initPullToRefresh(){
  const scroll = document.getElementById("main-scroll");
  if(!scroll || scroll._ptrInit) return;
  scroll._ptrInit = true;

  scroll.addEventListener("touchstart", e=>{
    if(scroll.scrollTop === 0){
      _ptrStartY = e.touches[0].clientY;
      _ptrActive = true;
      _ptrTriggered = false;
    }
  }, { passive: true });

  scroll.addEventListener("touchmove", e=>{
    if(!_ptrActive) return;
    const dy = e.touches[0].clientY - _ptrStartY;
    if(dy > 60 && !_ptrTriggered && scroll.scrollTop === 0){
      _ptrTriggered = true;
      const ind = document.getElementById("ptr-indicator");
      if(ind){ ind.classList.add("visible"); }
      const txt = document.getElementById("ptr-text");
      if(txt) txt.textContent = "Uvoľnite pre obnovenie...";
    }
  }, { passive: true });

  scroll.addEventListener("touchend", async ()=>{
    if(!_ptrActive) return;
    _ptrActive = false;
    if(!_ptrTriggered) return;
    _ptrTriggered = false;
    const ind = document.getElementById("ptr-indicator");
    const txt = document.getElementById("ptr-text");
    if(txt) txt.textContent = "Načítavam...";
    // Refresh current view
    if(S.view === "week"){
      await reloadWeek();
    } else if(S.view === "history" || S.view === "stats"){
      S.allLoaded = false;
      await loadAll();
    }
    if(ind){ ind.classList.remove("visible"); }
  });
}
